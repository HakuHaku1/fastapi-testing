<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Document</title>
</head>
<body style="background-color: #5475bb;">
    <h1 class="title title-container" style="font-size: 4rem; margin-top: 7rem; margin-left: 27rem;" style="justify-content: center;">FastAPI</h1>
    <h3 class="title title-container " style="justify-content: center; margin-left: 27rem">Hakutech Company</h3>
    <div class="card" style="justify-content: center; margin-top: 5rem; margin-left: 44.5rem;">
        <h1 class="card-title">Check your password</h1>
        <p class="card-body p" style="color: #fff;">Enter your email and password to check if it is valid

        <form action="/check_password" method="post">
            <input style="margin-left: 1rem; " class="card-body p input" type="email" name="email" placeholder="example@gmail.com" required>
            <input class="card-body p input" type="password" name="password" placeholder="Enter password" required>
            <button style=" margin-left: 8.5rem; margin-top: 2rem">
                <span class="shadow"></span>
                <span class="edge"></span>
                <span class="front text"> Click me
                </span>
            </button>

        </form>
</body>
</html>
